<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Turf Booking Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --dark: #0f172a;
            --light-bg: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --text-main: #334155;
            --text-muted: #64748b;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success-bg: #d1fae5;
            --success-text: #065f46;
            --error-bg: #fee2e2;
            --error-text: #991b1b;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 40px 20px;
            background-color: var(--light-bg); 
            color: var(--text-main);
            line-height: 1.5;
        }

        .dashboard { 
            max-width: 1100px; 
            margin: auto; 
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        header h1 {
            color: var(--dark);
            font-size: 2.5rem;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        header h1 i {
            color: var(--primary);
            margin-right: 10px;
        }

        header p {
            color: var(--text-muted);
            margin: 0;
            font-size: 1.1rem;
        }

        /* 2-Column Responsive Layout */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media (min-width: 850px) {
            .grid {
                grid-template-columns: 380px 1fr;
            }
        }

        .card { 
            background: var(--card-bg); 
            padding: 28px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border: 1px solid var(--border);
        }

        h2 { 
            color: var(--dark); 
            font-size: 1.35rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.02em;
        }

        h2 i {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Form Inputs Styling */
        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 6px; 
            font-size: 0.9rem;
            color: var(--text-main);
        }

        input { 
            width: 100%; 
            padding: 11px 14px; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--dark);
            background-color: var(--light-bg);
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        button.btn-primary { 
            width: 100%;
            background-color: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            cursor: pointer; 
            border-radius: 10px; 
            font-size: 1rem; 
            font-weight: 600;
            font-family: inherit;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        button.btn-primary:hover { background-color: var(--primary-hover); }
        button.btn-primary:active { transform: scale(0.98); }

        /* Clean Table Layout */
        .table-container {
            overflow-x: auto;
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left;
        }

        th, td { 
            padding: 16px; 
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        th { 
            background-color: var(--light-bg); 
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(248, 250, 252, 0.75);
        }

        button.btn-danger {
            background-color: transparent;
            color: var(--danger);
            border: 1px solid var(--border);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        button.btn-danger:hover {
            background-color: var(--error-bg);
            border-color: var(--error-bg);
            color: var(--danger-hover);
        }

        /* Banner Notification Popups */
        .alert { 
            padding: 14px 18px; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .success { background-color: var(--success-bg); color: var(--success-text); }
        .error { background-color: var(--error-bg); color: var(--error-text); }
    </style>
</head>
<body>

<div class="dashboard">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
        <div style="text-align: left;">
            <h1><i class="fa-solid fa-cloud-sun"></i>Turf Arena</h1>
            <p>Live Pitch Allocation & Booking Dashboard</p>
        </div>

        <!-- Admin Status / Login Link -->
        <div>
            <!-- Shown if user is NOT logged in -->
            <div th:unless="${#authorization.expression('isAuthenticated()')}">
                <a href="/login" class="btn-primary" style="text-decoration: none; padding: 8px 16px; font-size: 0.9rem;">
                    <i class="fa-solid fa-user-shield"></i> Admin Login
                </a>
            </div>

            <!-- Shown if user IS logged in as Admin -->
            <div th:if="${#authorization.expression('isAuthenticated()')}" style="display: flex; align-items: center; gap: 12px;">
                <span style="font-size: 0.9rem; font-weight: 600; color: var(--primary);">
                    <i class="fa-solid fa-user-check"></i> Admin Active
                </span>
                <a href="/logout" class="btn-danger" style="text-decoration: none; padding: 6px 12px; font-size: 0.85rem;">
                    Logout
                </a>
            </div>
        </div>
    </header>

    <!-- Global System Notifications -->
    <div th:if="${error}" class="alert error">
        <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="alert success">
        <i class="fa-solid fa-circle-check"></i> <span th:text="${success}"></span>
    </div>

    <div class="grid">
        <!-- Column 1: Entry Placement Form -->
        <div class="card">
            <h2><i class="fa-solid fa-calendar-plus"></i>New Reservation</h2>
            <form th:action="@{/bookings}" th:object="${newBooking}" method="post">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" th:field="*{customerName}" placeholder="e.g. Cristiano" required />
                </div>
                <div class="form-group">
                    <label>Select Arena / Court</label>
                    <input type="text" th:field="*{turfName}" placeholder="e.g. Stamford Bridge" required />
                </div>
                <div class="form-group">
                    <label>Start Match Time</label>
                    <input type="text" id="startTimePicker" th:field="*{startTime}" placeholder="Select Date & Time" required />
                </div>
                <div class="form-group">
                    <label>End Match Time</label>
                    <input type="text" id="endTimePicker" th:field="*{endTime}" placeholder="Select Date & Time" required />
                </div>
                <button type="submit" class="btn-primary">Secure Slot</button>
            </form>
        </div>

        <!-- Column 2: Manifest Database Ledger -->
        <div class="card">
            <h2><i class="fa-solid fa-list-timeline"></i>Live Schedule Ledger</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Player / Team</th>
                            <th>Arena</th>
                            <th>Kick Off</th>
                            <th>Final Whistle</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="booking : ${allBookings}">
                            <td style="font-weight: 600; color: var(--dark);" th:text="${booking.customerName}"></td>
                            <td><span th:text="${booking.turfName}"></span></td>
                            <td th:text="${#temporals.format(booking.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                            <td th:text="${#temporals.format(booking.endTime, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <!-- 1. IF ADMIN: Show functional Delete button -->
                                <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
                                    <form th:action="@{'/bookings/delete/' + ${booking.id}}" method="post" style="margin: 0;">
                                        <button type="submit" 
                                                class="btn-danger" 
                                                onclick="return confirm('Are you sure you want to cancel this booking?');">
                                            Cancel
                                        </button>
                                    </form>
                                </div>

                                <!-- 2. IF GUEST: Show locked status -->
                                <div th:unless="${#authorization.expression('hasRole(''ADMIN'')')}">
                                    <span style="font-size: 0.8rem; color: var(--text-muted); font-style: italic;">
                                        <i class="fa-solid fa-lock"></i> Admin Only
                                    </span>
                                </div>
                            </td>
                        </tr>
                        <!-- Fallback empty state handling -->
                        <tr th:if="${#lists.isEmpty(allBookings)}">
                            <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 40px 0;">
                                <i class="fa-solid fa-calendar-xmark" style="font-size: 2rem; display: block; margin-bottom: 12px; color: var(--border);"></i>
                                No active bookings in the ledger system.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    const config = {
        enableTime: true,
        altInput: true,                  // Pretty, human-readable layout
        altFormat: "Y-m-d H:i",         // What user sees: 2026-07-14 14:30
        dateFormat: "Y-m-d\\TH:i:S",     // What Java sees: ISO Standard
        minDate: "today",
        time_24hr: true,
        minuteIncrement: 15
    };
    // Bind selectors to input fields
    flatpickr("#startTimePicker", config);
    flatpickr("#endTimePicker", config);
</script>
</body>
</html>
