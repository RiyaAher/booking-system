<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Turf Booking System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f7f6; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; border-bottom: 2px solid #2ecc71; padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #2ecc71; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-size: 16px; }
        button:hover { background-color: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        .alert { padding: 10px; border-radius: 4px; margin-bottom: 20px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
<div class="container">
    <h2>🏟️ Book Your Turf Slot</h2>

    <!-- Dynamic Alert Messages (Success/Error feedback) -->
    <div th:if="${error}" class="alert error" th:text="${error}"></div>
    <div th:if="${success}" class="alert success" th:text="${success}"></div>

    <!-- Booking Input Form -->
    <form th:action="@{/bookings}" th:object="${newBooking}" method="post">
        <div class="form-group">
            <label>Customer Name:</label>
            <input type="text" th:field="*{customerName}" required />
        </div>
        <div class="form-group">
            <label>Turf Name:</label>
            <input type="text" th:field="*{turfName}" required />
        </div>
        <div class="form-group">
            <label>Start Time:</label>
            <input type="datetime-local" th:field="*{startTime}" required />
        </div>
        <div class="form-group">
            <label>End Time:</label>
            <input type="datetime-local" th:field="*{endTime}" required />
        </div>
        <button type="submit">Submit Booking</button>
    </form>

    <h2>📅 Current Reservations</h2>
    <table>
        <thead>
            <tr>
                <th>Customer Name</th>
                <th>Turf Name</th>
                <th>Starts At</th>
                <th>Ends At</th>
            </tr>
        </thead>
        <tbody>
            <!-- Loop through our bookings and print rows -->
            <tr th:each="booking : ${allBookings}">
                <td th:text="${booking.customerName}"></td>
                <td th:text="${booking.turfName}"></td>
                <td th:text="${#temporals.format(booking.startTime, 'yyyy-MM-dd HH:mm')}"></td>
                <td th:text="${#temporals.format(booking.endTime, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
